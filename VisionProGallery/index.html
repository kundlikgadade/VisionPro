<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Virtual Exhibition</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

    <!-- Sky -->
    <a-sky color="#EAEAEA"></a-sky>

    <!-- Floor -->
    <a-box
        position="0 -0.1 0"
        width="20"
        height="0.2"
        depth="20"
        color="#D8D8D8">
    </a-box>

    <!-- Ceiling -->
    <a-box
        position="0 5 0"
        width="20"
        height="0.2"
        depth="20"
        color="#FFFFFF">
    </a-box>

    <!-- Walls -->
    <a-box
        position="0 2.5 -10"
        width="20"
        height="5"
        depth="0.2"
        color="#F5F5F5">
    </a-box>

    <a-box
        position="0 2.5 10"
        width="20"
        height="5"
        depth="0.2"
        color="#F5F5F5">
    </a-box>

    <a-box
        position="-10 2.5 0"
        width="0.2"
        height="5"
        depth="20"
        color="#F5F5F5">
    </a-box>

    <a-box
        position="10 2.5 0"
        width="0.2"
        height="5"
        depth="20"
        color="#F5F5F5">
    </a-box>

    <!-- Lighting -->
    <a-light
        type="ambient"
        intensity="0.8">
    </a-light>

    <a-light
        type="point"
        intensity="1.5"
        position="0 4 0">
    </a-light>

    <a-light
        type="point"
        intensity="1"
        position="-4 4 -5">
    </a-light>

    <a-light
        type="point"
        intensity="1"
        position="0 4 -5">
    </a-light>

    <a-light
        type="point"
        intensity="1"
        position="4 4 -5">
    </a-light>

    <!-- Camera -->
    <a-entity
        camera
        position="0 1.6 6"
        look-controls
        wasd-controls>
    </a-entity>

   <a-cylinder
    position="0 0.5 -3"
    radius="0.8"
    height="1"
    color="white">
</a-cylinder>

<a-entity
    gltf-model="models/car.glb"
    position="0 1.6 -3"
    rotation="0 180 0"
    scale="1 1 1">
</a-entity>

<a-text
    value="Concept Car"
    position="0 0.2 -3"
    align="center"
    color="black"
    width="6">
</a-text>


<!-- ================= ROBOT (LEFT) ================= -->

<a-cylinder
    position="-3 0.5 0"
    radius="0.8"
    height="1"
    color="white">
</a-cylinder>

<a-entity
    gltf-model="models/robot.glb"
    position="-3 1.6 0"
    rotation="0 90 0"
    scale="1 1 1">
</a-entity>

<a-text
    value="Service Robot"
    position="-3 0.2 0"
    align="center"
    color="black"
    width="6"
    rotation="0 90 0">
</a-text>


<!-- ================= BIKE (RIGHT) ================= -->

<a-cylinder
    position="3 0.5 0"
    radius="0.8"
    height="1"
    color="white">
</a-cylinder>

<a-entity
    gltf-model="models/bike.glb"
    position="3 1.6 0"
    rotation="0 -90 0"
    scale="1 1 1">
</a-entity>

<a-text
    value="Sports Bike"
    position="3 0.2 0"
    align="center"
    color="black"
    width="6"
    rotation="0 -90 0">
</a-text>

</a-scene>

<button id="exitVR"
        style="position:fixed;
               top:20px;
               right:20px;
               z-index:999;
               padding:10px 20px;">
    Exit Exhibition
</button>

<script>
document.getElementById('exitVR').onclick = function () {
    const scene = document.querySelector('a-scene');

    if (scene.is('vr-mode')) {
        scene.exitVR();
    }
};
</script>    
    
</body>
</html>
